name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Syntax check
        run: |
          bash -n claude-bootstrap.sh
          bash -n claude-reset.sh
          bash -n hooks/protect-main.sh
          bash -n hooks/protect-main.test.sh
          bash -n hooks/protect-database.sh
          bash -n hooks/protect-database.test.sh
          bash -n hooks/memory-update.sh
          bash -n hooks/memory-update.test.sh
          bash -n hooks/memory-cleanup.sh
          bash -n hooks/memory-cleanup.test.sh
          bash -n hooks/canonical-sdlc-evidence-gate.sh
          bash -n hooks/canonical-sdlc-evidence-gate.test.sh
          bash -n tests/scripts.test.sh
          bash -n test.sh
          bash -n lib/platform.sh
          bash -n lib/platform.test.sh
          bash -n wsl-setup.sh
      - name: ShellCheck main scripts
        run: shellcheck --severity=warning claude-bootstrap.sh claude-reset.sh test.sh lib/platform.sh wsl-setup.sh
      - name: ShellCheck hooks
        run: shellcheck hooks/protect-main.sh hooks/protect-database.sh hooks/memory-update.sh hooks/memory-cleanup.sh hooks/canonical-sdlc-evidence-gate.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Run all tests
        run: bash test.sh

  test-macos:
    runs-on: macos-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run all tests
        run: bash test.sh
